function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==="class") el.className=v;
    else if (k==="style") el.style.cssText=v;
    else if (k.startsWith("on")) el[k]=v;
    else el.setAttribute(k,v);
  }
  children.flat().forEach(c => {
    if (c==null) return;
    el.append(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return el;
}

function radio(options, selected, onChange) {
  return h("div",{class:"grid gap-2 mt-2"},
    options.map(opt => {
      const label = h("label",{class:`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${selected===opt?"border-blue-500 bg-blue-50":"border-slate-200 hover:border-blue-300 bg-white"}`},
        h("div",{class:`w-5 h-5 mt-0.5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${selected===opt?"border-blue-600":"border-slate-300"}`},
          selected===opt ? h("div",{class:"w-2.5 h-2.5 rounded-full bg-blue-600"}) : null
        ),
        h("span",{class:`text-sm leading-snug ${selected===opt?"text-blue-700 font-medium":"text-slate-600"}`}, opt)
      );
      label.onclick = () => { onChange(opt); render(); };
      return label;
    })
  );
}

function checkbox(options, selected, onChange) {
  return h("div",{class:"grid gap-2 mt-2"},
    options.map(opt => {
      const checked = selected.includes(opt);
      const label = h("label",{class:`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${checked?"border-blue-500 bg-blue-50":"border-slate-200 hover:border-blue-300 bg-white"}`},
        h("div",{class:`w-5 h-5 mt-0.5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${checked?"bg-blue-600 border-blue-600":"border-slate-300"}`},
          checked ? h("svg",{class:"w-3 h-3",viewBox:"0 0 12 12",fill:"none"},
            h("path",{d:"M2 6l3 3 5-5",stroke:"white","stroke-width":"2","stroke-linecap":"round"})
          ) : null
        ),
        h("span",{class:`text-sm leading-snug ${checked?"text-blue-700 font-medium":"text-slate-600"}`}, opt)
      );
      label.onclick = () => { onChange(opt); render(); };
      return label;
    })
  );
}

function starRating(label, value, onChange) {
  const labels = ["","น้อยมาก","น้อย","ปานกลาง","มาก","มากที่สุด"];
  const row = h("div",{class:"py-2"},
    h("div",{class:"flex items-start gap-2 mb-1"},
      h("span",{class:"text-sm text-slate-600 flex-1 leading-snug"}, label)
    ),
    h("div",{class:"flex items-center gap-1.5"},
      ...[1,2,3,4,5].map(n => {
        const btn = h("button",{class:`w-10 h-10 rounded-lg text-sm font-bold border-2 transition-all ${value===n?"bg-blue-600 border-blue-600 text-white shadow-lg":"bg-white border-slate-200 text-slate-400 hover:border-blue-400"}`}, String(n));
        btn.onclick = () => { onChange(n); render(); };
        return btn;
      }),
      h("span",{class:"text-xs text-slate-400 ml-1"}, value>0 ? labels[value] : "—")
    )
  );
  return row;
}

function scoringDim(dim, value, onChange) {
  const selectedScore = dim.scores.find(s=>s.n===value);
  return h("div",{class:"mb-5"},
    h("p",{class:"text-sm font-semibold text-slate-700 mb-0.5"}, dim.label),
    h("p",{class:"text-xs text-slate-500 mb-3"}, dim.hint),
    h("div",{class:"flex gap-2"},
      ...dim.scores.map(({n,desc}) => {
        const wrap = h("div",{class:"flex-1 relative group has-tooltip"});
        const btn = h("button",{class:`w-full py-2.5 rounded-lg text-sm font-bold border-2 transition-all ${value===n?"bg-blue-600 border-blue-600 text-white shadow":"bg-white border-slate-200 text-slate-400 hover:border-blue-400"}`}, String(n));
        btn.onclick = () => { onChange(n); render(); };
        const tip = h("div",{class:"tooltip absolute bottom-full left-1/2 mb-2 z-10 pointer-events-none",style:"transform:translateX(-50%);min-width:180px;max-width:220px"},
          h("div",{class:"bg-slate-800 text-white text-xs rounded-xl px-3 py-2 shadow-xl leading-relaxed"},
            h("span",{class:"font-bold text-blue-300"}, n+" — "),
            desc
          ),
          h("div",{style:"width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #1e293b;margin:0 auto"})
        );
        wrap.append(btn, tip);
        return wrap;
      })
    ),
    value>0 ? h("div",{class:"mt-2 px-3 py-2 bg-white rounded-lg border border-blue-200 text-xs text-slate-600"},
      h("span",{class:"font-semibold text-blue-600"}, `คะแนน ${value}: `),
      selectedScore ? selectedScore.desc : ""
    ) : null
  );
}

          h("span",{class:"text-2xl font-black text-blue-600"}, `${totalScore} / 5.0`)
        ),
        h("div",{class:`mt-2 px-3 py-2 rounded-lg border text-sm font-semibold ${pInfo.color}`},
          `${pInfo.label} — ${pInfo.desc}`
        )
      ) : null
    )
  );
}

function renderStep5() {
  const skillVals = form.skills.filter(v=>v>0);
  const avgSkill = skillVals.length ? (skillVals.reduce((a,b)=>a+b,0)/skillVals.length).toFixed(1) : "-";
  const textarea = h("textarea",{class:"w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none resize-none",rows:"5",placeholder:"แสดงความคิดเห็น ข้อเสนอแนะ หรือไอเดียของคุณได้เลย..."});
  textarea.value = form.suggestions;
  textarea.oninput = e => form.suggestions=e.target.value;
  return h("div",{},
    h("label",{class:"block text-sm font-semibold text-slate-700 mb-2"}, "ข้อเสนอแนะเกี่ยวกับการนำ AI มาใช้ใน ASCG"),
    textarea,
    h("div",{class:"mt-5 bg-slate-50 rounded-xl p-4 text-sm text-slate-500"},
      h("p",{class:"font-semibold text-slate-700 mb-2"}, "สรุปคำตอบของคุณ"),
      h("div",{class:"space-y-1"},
        h("p",{}, "หน่วยงาน: ", h("strong",{class:"text-slate-700"}, form.unit||"-")),
        h("p",{}, "ความถี่ใช้ AI: ", h("strong",{class:"text-slate-700"}, form.aiFreq||"-")),
        h("p",{}, "ทักษะ AI เฉลี่ย: ", h("strong",{class:"text-blue-600"}, avgSkill)),
        h("p",{}, "ปัญหาที่ระบุ: ", h("strong",{class:"text-slate-700"}, form.problemName||"(ไม่ได้ระบุ)"))
      )
    )
  );
}

function renderSuccess() {
  return h("div",{class:"text-center py-16 fade-in"},
    h("div",{class:"w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-4xl mx-auto mb-5"}, "✅"),
    h("h2",{class:"text-2xl font-bold text-slate-800 mb-2"}, "ขอบคุณที่ตอบแบบสอบถาม!"),
    h("p",{class:"text-slate-500 text-sm leading-relaxed"}, "คำตอบของคุณถูกบันทึกลง Google Sheets แล้ว", h("br",{}), "ข้อมูลจะถูกรวบรวมเพื่อพัฒนา AI Strategy ของ ASCG")
  );
}

function renderSending() {
  return h("div",{class:"text-center py-16 fade-in"},
    h("div",{class:"w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full mx-auto mb-5",style:"animation:spin 1s linear infinite"}),
    h("p",{class:"text-slate-600"}, "กำลังบันทึกข้อมูล...")
  );
}

// ══════════════════════════════════════════════
// CALC
// ══════════════════════════════════════════════
function calcTotal() {
  const s = form.scoring;
  return (s.business*0.4 + s.feasibility*0.3 + s.speed*0.2 + s.crossGroup*0.1).toFixed(2);
}
function getPriority(score) {
  const n = parseFloat(score);
  if (n >= 4.0) return { label:"Priority 1", color:"text-red-600 bg-red-50 border-red-200", desc:"อนุมัติ Pilot ทันที" };
  if (n >= 2.5) return { label:"Priority 2", color:"text-amber-600 bg-amber-50 border-amber-200", desc:"คิวไตรมาสถัดไป" };
  return { label:"Priority 3", color:"text-green-600 bg-green-50 border-green-200", desc:"บันทึกไว้ก่อน" };
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  // Progress
  const pb = document.getElementById("progressBar");
  pb.innerHTML = "";
  STEPS.forEach((s,i) => {
    const circle = h("div",{class:`flex items-center justify-center w-8 h-8 rounded-full text-sm font-bold transition-all ${i<step?"bg-blue-600 text-white":i===step?"bg-blue-600 text-white ring-4 ring-blue-200":"bg-slate-200 text-slate-400"}`},
      i<step?"✓":String(i+1)
    );
    pb.append(circle);
    if (i<STEPS.length-1) {
      pb.append(h("div",{class:`flex-1 h-1 mx-1 rounded ${i<step?"bg-blue-600":"bg-slate-200"}`}));
    }
  });

  // Step label
  const fc = document.getElementById("formCard");
  fc.innerHTML = "";
  const label = h("div",{class:"mb-5"},
    h("span",{class:"text-xs font-semibold text-blue-500 uppercase tracking-widest"}, `${STEPS[step].icon} ส่วนที่ ${step+1}`),
    h("h2",{class:"text-xl font-bold text-slate-800 mt-1"}, STEPS[step].title),
    h("div",{class:"h-px bg-slate-200 mt-4"})
  );
  fc.append(label);

  const body = [renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5][step]();
  fc.append(body);

  // Nav buttons
  const nav = document.getElementById("navButtons");
  nav.innerHTML = "";
  if (step>0) {
    const back = h("button",{class:"px-6 py-3 border-2 border-slate-200 text-slate-600 rounded-xl font-semibold hover:border-slate-300 transition-colors"}, "← ย้อนกลับ");
    back.onclick = () => { step--; render(); window.scrollTo(0,0); };
    nav.append(back);
  }
  if (step < STEPS.length-1) {
    const next = h("button",{class:"flex-1 px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200"}, "ถัดไป →");
    next.onclick = () => { step++; render(); window.scrollTo(0,0); };
    nav.append(next);
  } else {
    const submit = h("button",{class:"flex-1 px-6 py-3 bg-green-600 text-white rounded-xl font-semibold hover:bg-green-700 transition-colors shadow-lg shadow-green-200"}, "✓ ส่งแบบสอบถาม");
    submit.onclick = submitForm;
    nav.append(submit);
  }
}

// ══════════════════════════════════════════════
// SUBMIT → Google Sheets
// ══════════════════════════════════════════════
async function submitForm() {
  const fc = document.getElementById("formCard");
  const nav = document.getElementById("navButtons");
  fc.innerHTML = "";
  nav.innerHTML = "";
  fc.append(renderSending());

  const payload = {
    ...form,
    id: "r-" + Date.now(),
    timestamp: new Date().toISOString()
  };

  try {
    // Google Apps Script requires no-cors mode; use fetch with redirect follow
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    // no-cors = opaque response, assume success if no throw
    fc.innerHTML = "";
    fc.append(renderSuccess());
  } catch (err) {
    fc.innerHTML = "";
    fc.append(
      h("div",{class:"text-center py-12"},
        h("div",{class:"text-4xl mb-3"}, "⚠️"),
        h("p",{class:"font-semibold text-slate-700"}, "ส่งข้อมูลไม่สำเร็จ"),
        h("p",{class:"text-sm text-slate-500 mt-1"}, err.message),
        h("button",{class:"mt-4 px-6 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700"}, "ลองอีกครั้ง")
      )
    );
  }
}

// ── Spin animation ──────────────────────────────
const style = document.createElement("style");
style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
document.head.append(style);

// ── Init ─────────────────────────────────────────
render();
</script>
